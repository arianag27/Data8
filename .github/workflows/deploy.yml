name: Build and Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install mamba
        uses: mamba-org/setup-micromamba@v1
        with:
          micromamba-version: '1.5.8-0'
          environment-file: .github/build-environment.yml
          cache-environment: true

      - name: Verify content has no broken symlinks
        run: |
          broken=$(find content -type l ! -exec test -e {} \; -print)
          if [ -n "$broken" ]; then
            echo "Broken symlinks under content/ (fix or remove before deploy):"
            echo "$broken"
            exit 1
          fi

      - name: Build the JupyterLite site
        shell: bash -l {0}
        run: |
          cp README.md content
          rm -f .jupyterlite.doit.db
          jupyter lite build --contents content --output-dir dist
          test -f landing/index.html
          cp landing/index.html dist/index.html
          test -f dist/api/contents/all.json
          echo "Contents index: dist/api/contents/all.json ($(wc -c < dist/api/contents/all.json) bytes)"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
